<svg viewBox="0 0 840 362" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Peacock and the Sparrow">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1f33"/>
      <stop offset="100%" stop-color="#15172a"/>
    </linearGradient>
    <style>
      .head { font: 700 26px Georgia, serif; fill: #ffd166; }
      .meta { font: 13px 'Courier New', monospace; fill: #8b93b8; }
      .body { font: 17px Georgia, serif; fill: #dde2f1; }
      .moral { font: italic 17px Georgia, serif; fill: #f4a261; }
      .ln { opacity: 0; animation: rise 0.9s ease forwards; }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .rule { stroke: #ffd166; stroke-width: 1; opacity: 0.5; stroke-dasharray: 700; stroke-dashoffset: 700; animation: draw 2.5s ease 0.4s forwards; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
  </defs>
  <rect width="840" height="362" rx="14" fill="url(#parchment)" stroke="#2e3354" stroke-width="1.5"/>
  <text class="head" x="70" y="52">✦ The Peacock and the Sparrow</text>
  <line class="rule" x1="70" y1="66" x2="770" y2="66"/>
  <text style="animation-delay:0.80s" class="body ln" x="70" y="96">A peacock mocked a sparrow for her drab feathers and small size. 'I am</text>
  <text style="animation-delay:0.98s" class="body ln" x="70" y="123">admired by thousands,' he boasted, fanning his brilliant tail. The sparrow</text>
  <text style="animation-delay:1.16s" class="body ln" x="70" y="150">said nothing. Years passed. The peacock's feathers faded and fell. His</text>
  <text style="animation-delay:1.34s" class="body ln" x="70" y="177">joints ached; he could barely walk. The sparrow, meanwhile, flew freely</text>
  <text style="animation-delay:1.52s" class="body ln" x="70" y="204">across mountains and seas, her small frame tireless. One dawn, the peacock</text>
  <text style="animation-delay:1.70s" class="body ln" x="70" y="231">watched her disappear into the horizon and wept.</text>
  <text style="animation-delay:1.88s" class="moral ln" x="70" y="272">Moral: Beauty fades; usefulness endures across seasons.</text>
  <text class="meta" x="70" y="334">a the Panchatantra tradition fable · told fresh on 06 Jul 2026 · today's voice: Haiku 4.5 (efficiency)</text>
</svg>
