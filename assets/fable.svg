<svg viewBox="0 0 840 415" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Peacock and the Camera">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1f33"/>
      <stop offset="100%" stop-color="#15172a"/>
    </linearGradient>
    <style>
      .head { font: 700 26px Georgia, serif; fill: #ffd166; }
      .meta { font: 13px 'Courier New', monospace; fill: #8b93b8; }
      .body { font: 17px Georgia, serif; fill: #dde2f1; }
      .moral { font: italic 17px Georgia, serif; fill: #f4a261; }
      .ln { opacity: 0; animation: rise 0.9s ease forwards; }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .rule { stroke: #ffd166; stroke-width: 1; opacity: 0.5; stroke-dasharray: 700; stroke-dashoffset: 700; animation: draw 2.5s ease 0.4s forwards; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
  </defs>
  <rect width="840" height="415" rx="14" fill="url(#parchment)" stroke="#2e3354" stroke-width="1.5"/>
  <text class="head" x="70" y="52">✦ The Peacock and the Camera</text>
  <line class="rule" x1="70" y1="66" x2="770" y2="66"/>
  <text style="animation-delay:0.80s" class="body ln" x="70" y="96">A vain peacock spread his tail before a monkey holding a shiny phone.</text>
  <text style="animation-delay:0.98s" class="body ln" x="70" y="123">"Capture me," he demanded, "so all the forest may admire my glory</text>
  <text style="animation-delay:1.16s" class="body ln" x="70" y="150">forever." The monkey tapped and swiped, then frowned. "The screen is</text>
  <text style="animation-delay:1.34s" class="body ln" x="70" y="177">full," he said. "I have already photographed a thousand of my own faces</text>
  <text style="animation-delay:1.52s" class="body ln" x="70" y="204">today." The peacock waited, feathers trembling, but the monkey wandered</text>
  <text style="animation-delay:1.70s" class="body ln" x="70" y="231">off, still gazing at himself. The forest never saw the peacock's picture,</text>
  <text style="animation-delay:1.88s" class="body ln" x="70" y="258">and the peacock never saw the monkey again.</text>
  <text style="animation-delay:2.06s" class="moral ln" x="70" y="299">Moral: Those obsessed with themselves make poor audiences for</text>
  <text style="animation-delay:2.24s" class="moral ln" x="70" y="325">anyone else's pride.</text>
  <text class="meta" x="70" y="387">a the Panchatantra tradition fable · told fresh on 02 Jul 2026 · today's voice: Opus 4.8 (depth)</text>
</svg>
