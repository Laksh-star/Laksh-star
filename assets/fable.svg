<svg viewBox="0 0 840 389" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Peacock Who Counted Watchers">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1f33"/>
      <stop offset="100%" stop-color="#15172a"/>
    </linearGradient>
    <style>
      .head { font: 700 26px Georgia, serif; fill: #ffd166; }
      .meta { font: 13px 'Courier New', monospace; fill: #8b93b8; }
      .body { font: 17px Georgia, serif; fill: #dde2f1; }
      .moral { font: italic 17px Georgia, serif; fill: #f4a261; }
      .ln { opacity: 0; animation: rise 0.9s ease forwards; }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .rule { stroke: #ffd166; stroke-width: 1; opacity: 0.5; stroke-dasharray: 700; stroke-dashoffset: 700; animation: draw 2.5s ease 0.4s forwards; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
  </defs>
  <rect width="840" height="389" rx="14" fill="url(#parchment)" stroke="#2e3354" stroke-width="1.5"/>
  <text class="head" x="70" y="52">✦ The Peacock Who Counted Watchers</text>
  <line class="rule" x1="70" y1="66" x2="770" y2="66"/>
  <text style="animation-delay:0.80s" class="body ln" x="70" y="96">In a banyan grove, a peacock danced only when the mynah cried, 'Audience</text>
  <text style="animation-delay:0.98s" class="body ln" x="70" y="123">gathered!' He counted watchers the way merchants tally followers. One</text>
  <text style="animation-delay:1.16s" class="body ln" x="70" y="150">monsoon, the crowd drifted to a monkey juggling mangoes, and the peacock</text>
  <text style="animation-delay:1.34s" class="body ln" x="70" y="177">froze mid-step, tail half-spread, ashamed. An old tortoise blinked up from</text>
  <text style="animation-delay:1.52s" class="body ln" x="70" y="204">the mud. 'The rain has not left,' she said. 'Dance for what stays.' So the</text>
  <text style="animation-delay:1.70s" class="body ln" x="70" y="231">peacock danced alone, and that evening the peahen, who had never once</text>
  <text style="animation-delay:1.88s" class="body ln" x="70" y="258">joined the crowds, finally came near.</text>
  <text style="animation-delay:2.06s" class="moral ln" x="70" y="299">Moral: Applause is borrowed light; dance for the rain that stays.</text>
  <text class="meta" x="70" y="361">a the Panchatantra tradition fable · told fresh on 12 Jun 2026 by claude-fable-5</text>
</svg>
