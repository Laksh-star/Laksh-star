<svg viewBox="0 0 840 361" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Captain and the Crossroads">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1f33"/>
      <stop offset="100%" stop-color="#15172a"/>
    </linearGradient>
    <style>
      .head { font: 700 26px Georgia, serif; fill: #ffd166; }
      .meta { font: 13px 'Courier New', monospace; fill: #8b93b8; }
      .body { font: 17px Georgia, serif; fill: #dde2f1; }
      .moral { font: italic 17px Georgia, serif; fill: #f4a261; }
      .ln { opacity: 0; animation: rise 0.9s ease forwards; }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .rule { stroke: #ffd166; stroke-width: 1; opacity: 0.5; stroke-dasharray: 700; stroke-dashoffset: 700; animation: draw 2.5s ease 0.4s forwards; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
  </defs>
  <rect width="840" height="361" rx="14" fill="url(#parchment)" stroke="#2e3354" stroke-width="1.5"/>
  <text class="head" x="70" y="52">✦ The Captain and the Crossroads</text>
  <line class="rule" x1="70" y1="66" x2="770" y2="66"/>
  <text style="animation-delay:0.80s" class="body ln" x="70" y="96">A ship's captain, unable to choose between two routes, ordered the crew to</text>
  <text style="animation-delay:0.98s" class="body ln" x="70" y="123">sail straight ahead. The crew, confused, drifted sideways into shallows.</text>
  <text style="animation-delay:1.16s" class="body ln" x="70" y="150">When rocks tore the hull, the captain cried, "Why did no one decide?" His</text>
  <text style="animation-delay:1.34s" class="body ln" x="70" y="177">first mate replied, "We waited for you to choose, Captain. Indecision</text>
  <text style="animation-delay:1.52s" class="body ln" x="70" y="204">chose for us."</text>
  <text style="animation-delay:1.70s" class="moral ln" x="70" y="245">Moral: A bad decision navigates; indecision shipwrecks the entire</text>
  <text style="animation-delay:1.88s" class="moral ln" x="70" y="271">voyage.</text>
  <text class="meta" x="70" y="333">a leadership &amp; management fable · told fresh on 20 Jul 2026 · today's voice: Haiku 4.5 (efficiency)</text>
</svg>
