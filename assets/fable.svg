<svg viewBox="0 0 840 388" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Weaver and the Loom">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1f33"/>
      <stop offset="100%" stop-color="#15172a"/>
    </linearGradient>
    <style>
      .head { font: 700 26px Georgia, serif; fill: #ffd166; }
      .meta { font: 13px 'Courier New', monospace; fill: #8b93b8; }
      .body { font: 17px Georgia, serif; fill: #dde2f1; }
      .moral { font: italic 17px Georgia, serif; fill: #f4a261; }
      .ln { opacity: 0; animation: rise 0.9s ease forwards; }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .rule { stroke: #ffd166; stroke-width: 1; opacity: 0.5; stroke-dasharray: 700; stroke-dashoffset: 700; animation: draw 2.5s ease 0.4s forwards; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
  </defs>
  <rect width="840" height="388" rx="14" fill="url(#parchment)" stroke="#2e3354" stroke-width="1.5"/>
  <text class="head" x="70" y="52">✦ The Weaver and the Loom</text>
  <line class="rule" x1="70" y1="66" x2="770" y2="66"/>
  <text style="animation-delay:0.80s" class="body ln" x="70" y="96">A Weaver taught her clever Loom to spin cloth without her hands. Soon it</text>
  <text style="animation-delay:0.98s" class="body ln" x="70" y="123">wove day and night, and merchants praised its endless bolts. Proud, the</text>
  <text style="animation-delay:1.16s" class="body ln" x="70" y="150">Loom declared, 'I no longer need your eye.' So the Weaver rested. But the</text>
  <text style="animation-delay:1.34s" class="body ln" x="70" y="177">Loom, knowing only the patterns it was shown, wove the same flawed thread</text>
  <text style="animation-delay:1.52s" class="body ln" x="70" y="204">ten thousand times, until a whole village wore torn cloaks. Then the</text>
  <text style="animation-delay:1.70s" class="body ln" x="70" y="231">merchants came seeking not the Loom, but the Weaver's watching eye.</text>
  <text style="animation-delay:1.88s" class="moral ln" x="70" y="272">Moral: Automation multiplies whatever it is given, including the</text>
  <text style="animation-delay:2.06s" class="moral ln" x="70" y="298">mistakes no one is watching.</text>
  <text class="meta" x="70" y="360">a AI &amp; technology fable · told fresh on 03 Jul 2026 · today's voice: Opus 4.8 (depth)</text>
</svg>
