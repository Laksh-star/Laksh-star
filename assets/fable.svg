<svg viewBox="0 0 840 388" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Owl Who Called Another Meeting">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1f33"/>
      <stop offset="100%" stop-color="#15172a"/>
    </linearGradient>
    <style>
      .head { font: 700 26px Georgia, serif; fill: #ffd166; }
      .meta { font: 13px 'Courier New', monospace; fill: #8b93b8; }
      .body { font: 17px Georgia, serif; fill: #dde2f1; }
      .moral { font: italic 17px Georgia, serif; fill: #f4a261; }
      .ln { opacity: 0; animation: rise 0.9s ease forwards; }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .rule { stroke: #ffd166; stroke-width: 1; opacity: 0.5; stroke-dasharray: 700; stroke-dashoffset: 700; animation: draw 2.5s ease 0.4s forwards; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
  </defs>
  <rect width="840" height="388" rx="14" fill="url(#parchment)" stroke="#2e3354" stroke-width="1.5"/>
  <text class="head" x="70" y="52">✦ The Owl Who Called Another Meeting</text>
  <line class="rule" x1="70" y1="66" x2="770" y2="66"/>
  <text style="animation-delay:0.80s" class="body ln" x="70" y="96">An owl governed a forest of restless birds. Each dawn brought a choice:</text>
  <text style="animation-delay:0.98s" class="body ln" x="70" y="123">migrate south or brave the frost. The owl convened councils, formed</text>
  <text style="animation-delay:1.16s" class="body ln" x="70" y="150">committees, and commissioned studies of wind. The sparrows waited. The</text>
  <text style="animation-delay:1.34s" class="body ln" x="70" y="177">finches waited. When snow finally answered for him, half the flock was</text>
  <text style="animation-delay:1.52s" class="body ln" x="70" y="204">gone. The remaining birds scratched his name into bark — not in honor, but</text>
  <text style="animation-delay:1.70s" class="body ln" x="70" y="231">as warning.</text>
  <text style="animation-delay:1.88s" class="moral ln" x="70" y="272">Moral: The leader who decides nothing has already made the</text>
  <text style="animation-delay:2.06s" class="moral ln" x="70" y="298">costliest decision.</text>
  <text class="meta" x="70" y="360">a leadership &amp; management fable · told fresh on 14 Jun 2026 · today's voice: Sonnet 4.6 (balance)</text>
</svg>
