<svg viewBox="0 0 840 415" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Peacock's Followers">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1f33"/>
      <stop offset="100%" stop-color="#15172a"/>
    </linearGradient>
    <style>
      .head { font: 700 26px Georgia, serif; fill: #ffd166; }
      .meta { font: 13px 'Courier New', monospace; fill: #8b93b8; }
      .body { font: 17px Georgia, serif; fill: #dde2f1; }
      .moral { font: italic 17px Georgia, serif; fill: #f4a261; }
      .ln { opacity: 0; animation: rise 0.9s ease forwards; }
      @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
      .rule { stroke: #ffd166; stroke-width: 1; opacity: 0.5; stroke-dasharray: 700; stroke-dashoffset: 700; animation: draw 2.5s ease 0.4s forwards; }
      @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
  </defs>
  <rect width="840" height="415" rx="14" fill="url(#parchment)" stroke="#2e3354" stroke-width="1.5"/>
  <text class="head" x="70" y="52">✦ The Peacock's Followers</text>
  <line class="rule" x1="70" y1="66" x2="770" y2="66"/>
  <text style="animation-delay:0.80s" class="body ln" x="70" y="96">A peacock spread his tail beside the river and cried, "Behold my thousand</text>
  <text style="animation-delay:0.98s" class="body ln" x="70" y="123">admirers!" A crow counted the reflections shimmering in the water. "These</text>
  <text style="animation-delay:1.16s" class="body ln" x="70" y="150">are but ripples," said the crow. "When the wind stills, they vanish." The</text>
  <text style="animation-delay:1.34s" class="body ln" x="70" y="177">peacock laughed and danced harder, stirring the surface into brilliant</text>
  <text style="animation-delay:1.52s" class="body ln" x="70" y="204">fragments. That evening the water grew calm and empty. The peacock stared,</text>
  <text style="animation-delay:1.70s" class="body ln" x="70" y="231">alone, at a single reflection. "Where did they go?" he asked. The crow,</text>
  <text style="animation-delay:1.88s" class="body ln" x="70" y="258">roosting above, said nothing.</text>
  <text style="animation-delay:2.06s" class="moral ln" x="70" y="299">Moral: Applause measured in reflections disappears the moment the</text>
  <text style="animation-delay:2.24s" class="moral ln" x="70" y="325">water grows still.</text>
  <text class="meta" x="70" y="387">a the Panchatantra tradition fable · told fresh on 22 Jul 2026 · today's voice: Opus 4.8 (depth)</text>
</svg>
